# =============================================================================
# DebrisLink — Render.com Deployment Blueprint
# =============================================================================
# Free-tier setup: web service on Render (free), Postgres on Supabase (free).
# Set DATABASE_URL manually in the Render dashboard to your Supabase URI:
#   postgresql://postgres:PASSWORD@db.xxxxx.supabase.co:5432/postgres
# =============================================================================

services:
  - type: web
    name: debrislink-api
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /health

    envVars:
      # All env vars are set manually via the Render dashboard so the
      # Blueprint never auto-generates surprise values.
      - key: WHATSAPP_DRY_RUN
        value: "true"
      - key: WEB_CONCURRENCY
        value: "1"
